<!DOCTYPE html>
<html>
<head>
    <title>Moje Kalkulačka</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <style>
        body { background: #000; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; font-family: sans-serif; }
        .calc { background: #1c1c1c; padding: 20px; border-radius: 20px; width: 300px; }
        #display { width: 100%; height: 60px; font-size: 40px; text-align: right; margin-bottom: 20px; background: none; border: none; color: white; outline: none; }
        .buttons { display: grid; grid-template-columns: repeat(4, 1fr); gap: 10px; }
        button { height: 60px; border-radius: 30px; border: none; font-size: 20px; cursor: pointer; background: #333; color: white; }
        button:active { filter: brightness(1.5); }
        .op { background: #ff9f0a; }
        .special { background: #a5a5a5; color: black; }
    </style>
</head>
<body>
    <div class="calc">
        <input type="text" id="display" readonly value="0">
        <div class="buttons">
            <button class="special" onclick="clr()">AC</button>
            <button class="special" onclick="del()">C</button>
            <button class="op" onclick="ins('/')">/</button>
            <button class="op" onclick="ins('*')">×</button>
            <button onclick="ins('7')">7</button><button onclick="ins('8')">8</button><button onclick="ins('9')">9</button>
            <button class="op" onclick="ins('-')">-</button>
            <button onclick="ins('4')">4</button><button onclick="ins('5')">5</button><button onclick="ins('6')">6</button>
            <button class="op" onclick="ins('+')">+</button>
            <button onclick="ins('1')">1</button><button onclick="ins('2')">2</button><button onclick="ins('3')">3</button>
            <button class="op" onclick="calc()">=</button>
            <button style="grid-column: span 2" onclick="ins('0')">0</button>
            <button onclick="ins('.')">.</button>
        </div>
    </div>
    <script>
        let d = document.getElementById('display');
        function ins(v) { if(d.value === '0') d.value = v; else d.value += v; }
        function clr() { d.value = '0'; }
        function del() { d.value = d.value.slice(0, -1); if(d.value==='') d.value='0'; }
        function calc() { try { d.value = eval(d.value); } catch { d.value = 'Chyba'; } }
    </script>
</body>
</html>
